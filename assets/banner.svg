<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00193c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#002d62;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a3f69c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="16" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="820" cy="40" r="80" fill="#ffffff" fill-opacity="0.03" />
  <circle cx="860" cy="160" r="60" fill="#ffffff" fill-opacity="0.03" />
  <circle cx="80" cy="170" r="100" fill="#ffffff" fill-opacity="0.03" />

  <!-- Accent line -->
  <rect x="48" y="148" width="120" height="4" rx="2" fill="url(#accent)" />

  <!-- Credit card icon (simplified) -->
  <rect x="48" y="48" width="52" height="36" rx="6" fill="none" stroke="#4fc3f7" stroke-width="2" opacity="0.7"/>
  <rect x="48" y="60" width="52" height="8" fill="#4fc3f7" opacity="0.2"/>
  <rect x="54" y="72" width="16" height="4" rx="2" fill="#4fc3f7" opacity="0.5"/>
  <rect x="76" y="72" width="8" height="4" rx="2" fill="#4fc3f7" opacity="0.3"/>

  <!-- App name -->
  <text x="116" y="76" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="800" fill="#ffffff" letter-spacing="-0.5">Family Pay App</text>

  <!-- Hebrew subtitle -->
  <text x="116" y="108" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#a8c7e8" font-weight="400">ניהול הוצאות אשראי משותפות למשפחה</text>

  <!-- Tech badges -->
  <rect x="116" y="128" width="62" height="22" rx="11" fill="#ffffff" fill-opacity="0.1"/>
  <text x="147" y="143" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#4fc3f7" font-weight="600" text-anchor="middle">React</text>

  <rect x="186" y="128" width="80" height="22" rx="11" fill="#ffffff" fill-opacity="0.1"/>
  <text x="226" y="143" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#4fc3f7" font-weight="600" text-anchor="middle">TypeScript</text>

  <rect x="274" y="128" width="68" height="22" rx="11" fill="#ffffff" fill-opacity="0.1"/>
  <text x="308" y="143" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a3f69c" font-weight="600" text-anchor="middle">Supabase</text>

  <rect x="350" y="128" width="52" height="22" rx="11" fill="#ffffff" fill-opacity="0.1"/>
  <text x="376" y="143" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#4fc3f7" font-weight="600" text-anchor="middle">Vite</text>

  <rect x="410" y="128" width="80" height="22" rx="11" fill="#ffffff" fill-opacity="0.1"/>
  <text x="450" y="143" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a3f69c" font-weight="600" text-anchor="middle">Tailwind v4</text>
</svg>
