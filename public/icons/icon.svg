<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="115" fill="#00193c"/>

  <!-- Subtle gradient overlay for depth -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003580;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#000a1a;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="symbolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c8e6ff;stop-opacity:1"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#bgGrad)"/>

  <!-- Decorative arc / circle accent -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.08"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.05"/>

  <!-- Subtle top-left highlight -->
  <ellipse cx="160" cy="140" rx="120" ry="80" fill="#4a90d9" opacity="0.07"/>

  <!-- ₪ symbol — large, centered, with glow -->
  <text
    x="256"
    y="340"
    font-size="290"
    text-anchor="middle"
    fill="url(#symbolGrad)"
    font-family="'Arial', 'Helvetica', sans-serif"
    font-weight="700"
    filter="url(#glow)"
    opacity="0.97"
  >₪</text>

  <!-- Small decorative dots -->
  <circle cx="120" cy="392" r="6" fill="#ffffff" opacity="0.15"/>
  <circle cx="392" cy="120" r="6" fill="#ffffff" opacity="0.15"/>
  <circle cx="100" cy="130" r="3" fill="#4a90d9" opacity="0.3"/>
  <circle cx="410" cy="385" r="3" fill="#4a90d9" opacity="0.3"/>
</svg>
